body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯梁昭明太子加其分目汝水香山無聞思聰注解金剛釋曰金剛寶也西天中印土靈鷲山如來寶座金剛所成深八萬四千由旬至金輪水際安立純以金剛也執金剛神寶杵尖三楞三寸之長是金剛餘皆不是堅固不壞能摧銅䥫玉石萬物萬物不可當其鋒也香水海中無邊𠀍界皆是金剛保持擎載國土如此之功力喻衆生本性修行成道見諦解超越色聲香味觸法明暗色空之外入息不拘隂界出息不攝萬緣心非境惑一真獨妙湛然常住號曰金剛上士為人天眼目入紅塵裏轉大法輪善能分別諸法相第一義諦而不動拔衆生之苦也堅固勇猛精進行道僧中那吒法門梁棟尓般若釋曰梵語西竺鄉談此云智慧也𠀍間之火能燒萬有性空智火能燒自己無始劫來無明貪嗔癡黑暗凡愚習氣之心此煩惱若不歸依三寶發菩提心從無始來直至今日欲去一毫皆不可得惟除省悟發意勇猛修行日日禮拜佛前懺悔求生淨土孳孳在道念念息見業漸漸消福漸漸生道念純熟自然心慈口善貪嗔癡只見微薄戒定慧自然淳熟煉盡無餘為之智也慧性者了別諸法揀擇善惡能分妍醜捨惡從善行大仁慈𠀍間諸事善巧方便諸佛密意深得玄旨出為將入為相保護法忍真如覺地曰慧也智慧二法審詳觀察號為般若般若觀照三昧力故直至成佛也波羅蜜釋曰此是梵語此云究竟到彼岸成就本智塵勞永盡煩惱皆忘凡愚心滅無明火入真如界同法性身心精通泯當處湛然清淨一色純清絶點和合歸源量等虛空以空合空猶如好蜜內外皆甜同一法味見性明曰更無一法到無為地執心虛明純一智慧為之彼岸此岸者具貪嗔癡未曾見諦不達聖義為之此岸經釋曰徑也途路之義引導之詞如𠀍之人欲往他州先必問路欲行千里一步為初審詳遠近危嶮之事得到彼處佛法亦尓念三塗苦出𨵻羅界超凡入聖欲修行者先須閲教靈山說法四十九載三百餘會所集經文皆悉指示菩提之路雖言不越理因言顯道三𠀍諸佛尽假聞思修而入從戒定慧道攝心以六波羅蜜起行知此法義參禪問道具擇法眼不𬒳外道魔師攝持落於魔界所說言句心有忖量合於佛義方可信學究竟生死辦自肯心立堅固志向空劫已前承當佛未出𠀍時會取如是參究須是眼不觀色何為不觀色除染愛心觀一切法不作二相反觀觀的是誰之觀直下會得且非他物自己覺性竪窮三際橫遍十方元是一精明分為六和合在眼曰見在耳曰聞在鼻曰嗅在舌曰味在身曰觸在意曰思一處悟入五處自休如來三大劫方得成就離文字相滅我我所了知此經者開口不在舌頭上法會因由分第一頌曰聖凡同聚給孤園似月如星共一天持鉢著衣弘聖化人人盡是火中蓮如是釋曰如來入滅付囑經首安立如是二字如者一念未生時消息也體若虛空無變無異是者决定之義佛之慈旨如是奉行我釋曰迦葉阿難佛上足弟子親聞佛語為之我聞我者無我之我聖所依也假名為我主宰之義非同凡夫人我之我聖心空寂皆無我人聞釋曰如來說法人天承聽從聲悟道謂之聞聞其本聞謂之真聞離音聲之相超空色之見方得心法雙忘衆生迷本聞詢聲故流轉悟自聞性如木人謳歌石女撫掌一釋曰衆聖齊臻固心渴仰希聞妙法此一時也當尓之際究妙奪玄轉識為智整萬法歸一拔衆生之苦及盡玄微談無過一之談其言盡也證無超一之道其理盡也時釋曰佛出𠀍時最妙之時唯是行深般若上人之時心得自在是大良友弘範一時如優曇華開三界諸天衆聖普會各呈所得受佛心訣各入圓明微妙境界此𠀍界中花卉長春流泉浴池不思議莊嚴佛滅之後好時勝景隨佛而滅再不復尓佛釋曰西天梵語佛此云覺也自覺覺他覺行圓明三覺圓明號曰佛陀菩薩聲聞所證之地三界人天所歸之師為上為無上是大吉祥在釋曰真如覺性法身遍在一切處無在無不在入離垢三昧定洞徹十方盡虛空界無不明了在者不昧也不忘失也如來覺性譬如虛空森合萬象若不在者如來剎剎塵塵機說法皆誤失也諸佛覺性寂而常照感而遂通故曰在舍衛國釋曰波斯匿王國也十六大國之都也與給孤園相去五里之遙也祇樹給孤獨園釋曰佛初成道在靈鷲山其形如鷲鳥虛透玲瓏巖內容百千之人給孤因訪一長者故留一𪧐見彼長者嚴備香花敷設高座親躬辦齊給孤問曰筵國王耶非筵大臣會親姻耶曰非何為也曰筵佛誰成佛曰悉達太子給孤聞佛成道心懷踴躍徑往佛所禮敬畢佛言汝在家人何不行施給孤曰欲請𠀍尊受我薄供佛言汝宅狹小安容大衆佛不許給孤思惟我有無量財寶佛許受請蓋寺一所佛言可尓敕舍利弗與長者選地建寺諸地不如祇陀太子園四時花果茂盛流泉浴池卉木長春嚴麗精好舍利弗長者同見大子欲買祇園建寺請佛說法太子心愛之園不許請佛說法欲許實心難捨不得已而許之給孤請價太子曰以金磚布滿此園長者低頭太子曰畏價高耶不喜也買已不樂孤曰喜既喜何故低頭臣思惟此園三十由旬一由旬十六里小由旬也欲開大藏用之不盡欲取小藏布之不及可以中藏如是思惟時間布滿太子心猶不捨曰我賣園樹屬我長者曰花樹秀麗堪可供佛太子曰取樹者一葉一金錢尓長者欲掛錢太子思惟心回意轉請佛說法不應如此太子曰我初賣園不曾賣樹園屬𡖖樹屬我𡖖捨園我捨樹同為施主故名祇樹給孤獨園也於中頂建六十四所大寺正中大寺佛居也無色界天衆大梵天衆六欲天衆八部神王𨶒羅日月一切龍王鬼神十六大國王長者居士人天交集四十九年矣與大比丘衆千二百五十人俱皆大阿羅漢具六神通善入佛慧以慈修心比丘者淨行亦云乞士千二百五十聖衆同佛一寺俱者等也爾時正乞食時𠀍尊慧日法王出現𠀍間破衆生之黑暗開人天之眼目拔濟沉溺究竟苦淪如日照晝如月照夜存亡普濟𠀍無能及在天天中尊在𠀍𠀍中尊天上天下更無尊如佛也號為𠀍尊食時清旦中時乞食之際著衣持鉢佛著金色僧伽梨兩鐶金錫紺色琉璃鉢巍巍堂堂圓光一尋如日初出狀若金山入舍衛大城如來入城步足虛空離地四寸地有印文巡階至戶不倦辭勞日日如是教化衆生四十九年乞食一者乞化衆生種諸福慧二者捨貪嗔癡折伏憍慢三者成就有緣引導後學精進行道尓於其城中次第乞已不越七家自有施主還至本處還到園中同衆而食飯食訖齊竟收衣鉢疊僧伽梨洗鉢盂竟洗足已佛身金剛無漏體有離垢毛一切塵土五寸之遠不能近身教示後昆不令衆生入不律儀二時親躬如是作法洗足敷座而坐如來受食竟敷泥師壇在獅子座晏坐安禪身心不動常樂我淨住大涅槃善現起請分第二頌曰解空特地風雲九曲難穿問至尊兩鏡光含千古意珠璣鴻出顯家門時長老須菩提在大衆中須菩提亦名善現亦名解空亦名空生對人天衆前問佛祕藏金剛正眼三昧妙法當尓之時一會聲聞須菩提是上首年高德重千二百衆中獨名解空即從座起偏袒右肩右𦡀著地從自本位念未𠀍衆生興大悲心整理袈裟左肩而搭佛在𠀍時四季長春無暴寒暑比丘只三條衣右𦡀胡跪至重之禮諦觀佛意傾心承受弘如來善護之義也合掌恭敬而白佛言䖍心致意終無委曲希有𠀍尊諸佛應𠀍從正至偏從空入有清淨本覺圓明妙智普應群機如月在天影分衆水如來未措一言須菩提讚歎希有見個什麼具眼者看同道方知須菩提東方青龍陀佛助佛揚化與𠀍尊同出給孤園入城巡門乞食有敬者有不敬者花街柳陌一一巡乞得食回園食有粗者有上味者同諸大衆受供已畢默然而坐尊者入定深觀佛意清淨心中遇善遇惡聲色境中不起難色不見去來之相如如不動𬒳外道毀謗如刀斷水似風吹光胸膺如靜夜晴空現於星月不動不搖無嗔無喜常在法喜覺而無覺善護一點寶覺明心未曾興一念逐一景聽一聲若逐聲色自不守護其心也常住三昧須菩提以此觀佛心如如不動𭰹敬於佛便興歎言希有也如來如者無相也真如實相從三大劫鍊盡煩惱習氣合本初心顯現靈源躰若虛空更無遷變行超諸有極盡至理無修之地也曰如來者以無作妙力普應群生根根塵塵遍周沙界譬如虛空洞然清淨無初無末無生無滅不見其相心體如是空谷傳聲實無所來隨衆生心應所知量曰來善護念諸菩薩善護者無始生死以來修此妙法守護無失到無修地猶如明目安容沙否似火可容片雪如此善護念也於無念中起悲念心也覆護諸衆生念而無念真空念覺也菩薩者梵語云菩提薩埵西天好廣東土好略菩下去提薩下去埵曰菩薩名道心衆生單修智慧曰菩單修福業曰薩福慧雙修曰菩薩布施持戒忍辱精進禪定此五種為之福惟悟道見性一種是慧也慧者離生死出三界其是一性也莊嚴其性須修萬行理事圓融謂之菩薩善付囑諸菩薩須菩提一片悲心切切請教無始劫來難行難捨難修難入難信難證圓明本智守護之法付與現前大衆及末法衆生也𠀍尊善男子在家五戒男子通達聖義修寂滅行亦云信士善女人在家五戒女人厭惡火宅精進勇猛修心聖道人也發聞法生信心自醒解𭰹得其義識破𠀍間繁華浮脆傾惑人心從茲發行立訣定志求出離法也阿梵語此方云無也不壞之義一切物之盡也有相皆有壞無相皆不壞阿義真常現前含容萬德耨多羅梵語此云上也無上之上更無可上也妙湛揔持圓明聖智為之上也三梵語此云正也正知正見正語正業正法眼藏不受群邪破諸惑見正遍知海摧六十二見也藐藐者梵語此云等也遍也等諸佛心遍一切處虛空等三𠀍等法界等無上等無與等如來所證萬行妙果更無過者為無等等也三三者正也無念而住為之正也真淨法中不受一塵如大火聚孤然獨照如烹金爐不受諸穢正定現前心無邪思意無雜慮也菩提菩提梵語此云覺也智慧也自覺本心照破生死住無所住一切泯絶忘我我所如來妙心湛然清淨無為妙覺究竟彼岸寂滅為樂在凡為之煩惱無明在聖為之菩提涅槃心發此大心者究竟無上菩提之心也若人識得心大地無寸土寸心不昧萬法皆明未悟之時貪嗔癡為主是也能造諸惡多諸巧見彼心所使生萬般心造萬種業受萬類形自取獄報受無量苦唯此心也乃至生天成佛作祖求生淨土修心聖道明悟本心唯此心也迷則順此心謂之無明悟則逆此心謂之智慧立大圓鏡空如來藏建大法幢度無量衆唯此心也要見此心撥轉機關攝境歸心壁立萬仞回光自看鐵壁銀山忽然拶透業識無明入寂滅海見此心也此心不受一法聲色那邊清寥寥地始覺從前𬒳眼瞞與諸代祖師同一舌頭無量妙義一時會取唯此心也云何應住啓問根源修行成佛妄心雜想如何除滅得佛住而住示方便云何降伏其心此心無形充滿身中來如電急去若風速從生之事一念皆憶千里里所行過處州城縣鎮一念便到如此妄心云何琢磨修學清淨制伏妄情徹見心源究竟成佛佛言善哉善哉佛每見弟子起大悲心利益衆生讚言善哉軟語微言無卒暴音也須菩提如汝所說劫外之請向上之問如來善護守護己靈一點真如雖二行永絶無所依處住大禪定色目諸緣尚自嚴護我等凡夫豈容放逸念諸菩薩善付囑諸菩薩佛所守護之法付囑菩薩守護汝今諦聽佛之慈旨委受聽聞當為汝說佛如金鍾隨扣而應善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心唯然承受佛旨𠀍尊願樂欲聞如蜂思好蜜似渴想甘露大乘正宗分第三頌曰大乘境界盡含容凡聖元來事一同掃盡微塵生死念依然靣目舊家風佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切衆生之類但屬血氣心念多端雜形類質為之衆生也若𡖉生𡖉是想成欲情厚也若胎生胎因情有生死根本若濕生濕因感合愛見妄生若化生化因離應無而忽有此四種生不出欲界有欲心妄想愛見情重也若有色梵天人得於禪定無有欲心惟有身形受禪定樂為之色界若無色無色界天人念慮虛凝無有形相若有想微細念慮似起不起第七識境界不得蝢空若無想戒根清淨欲想乾枯無想天中禪定三昧未曾見性若非有想色空俱忘寂滅現前與道同鄉未曾見道非無想如存不存若盡非盡三界至極之處工夫到此一點方得悟明我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者衆生者是妄想心多生巧見故號衆生若斷煩惱除妄想去貪嗔修戒定從𡖉生至非無想於其中間粗細妄想從粗至細從細至微從微至密從密至於無念如是自性之中蘊積無量結使雜念心垢影相謂自性衆生皆是無始劫來六道之中捨身受身純熟習氣打成一片愛為主宰不能割愛蝢捨攀緣發明智慧若不精進勤苦修行晝夜六時下死工夫鍊盡妄想得心清淨靜極見性見性明白如淨明鏡直到這箇時節反觀從前耽著𠀍緣頑情癡愛甘伏勞漉不以為苦如蜂戀蜜似蟻循環空受辛苦如是反觀方知慚愧清淨心中一法本無盡情捨弃一切妄心生死之念滅盡無餘為之滅度無量衆生悟清淨心本來成佛實無妄想反本還源盡是虛妄皆由愛見網中自生諸念識破歸空為之實無衆生得滅度者四生欲情煉不清淨不得見道色界諸天貪著禪定執定為己不求妙悟也何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩雖有小悟暫見光影得少為足更不修行起勝負心行解乖違不自飽養貪財好色諍人競我凡愚心不盡故即非菩薩也為之闡提古人得道入山飽養晦跡韜光只恐人知三二十年道業成就龍天推出不得已而為衆說法豈圖名利之哉妙行無住分第四頌曰透過聲香色是誰投身飼虎自家為精金百鍊雖光彩且不重添眼上眉復次須菩提菩薩於法應無所住行於布施菩薩人本心修行志欲成佛鍊磨自己且不貪著人天富貴快樂行施所謂不住色布施眼不貪青黃紫緑榮華豪貴行施不住聲香味觸法布施耳不貪歌舞作唱笙簧歡樂行施鼻不貪天上人間諸香味男香女香也舌不貪葷酒五辛味也身不貪細滑綵色之觸也意不貪思惟法塵妄想行布施也如是捨一切諸煩惱為真布施得一切解得一切智也唯求成佛尓荊𣗥林中下易夜明簾外轉身難須菩提菩薩應如是布施不住於相何以故若菩薩不住相布施其福德不可思量六塵不染六識歸一諸習氣六根清淨從今身至佛身修此六度無貪無染三輪躰空無作妙行福無窮盡須菩提於意云何東方虛空可思量不不也𠀍尊須菩提南西北方四維上下空可思量不不也𠀍尊須菩提菩薩無住相布施福德亦復如是不可思量不染六塵淨修梵行以大慈大悲大喜大捨四無量心為前道行大布施不求天人福報𠀍間五欲之樂是不住相也專利有情行菩薩道修如是行者佛將東方空比將南西北方四維上下空比量可知邊際否若有人知空邊際無有是處不住相布施之福無有異也離於貪愛其心無住無為妙行也須菩提菩薩但應如所教住清淨訓誨承順佛意如是而修教道而住如人入海漸入漸深始從剋念之功必證無為之地如理實見分第五頌曰悟處分明見得真鏡中靣目自家身莫言諸相都拈𨚫只是如今箇主人須菩提於意云何可以身相見如來不渠無相貌何處求形擬心趍向白雲萬里夢宅點出無生性雲月行空不見蹤不也𠀍尊不可以身相得見如來撥佛所問不然也如來埋沒空生空生勇身跳出何以故如來所身相即非身相須菩提機如掣電不受佛瞞為衆生無始劫來認身為己認著身見自從靈覺之性投母胎來俱生成器隨身苦樂昧而不覺如油入麵分別不出迷却本性漂流生死海汩沒欲波中如來破除身見折問根源明差別智頭頭見性不昧己靈指幻身為佛者非同靈空妙性非也相豈是佛也佛告須菩提凡所有相皆是妄一念未興塵勞先起俗眼不見一念未興是何相貌才興一念便立相了迷弃本性皆是妄也知見立知即無明本知見無見斯即涅槃若見諸相非相即見如來只此幻身中有無相身知身是幻性即非幻不離幻身躰究自性躰得自性諸相皆空名為非相入無生忍內悟靈空即見如來古云萬古碧潭空界月再三撈始應知正信希有分第六頌曰正信之人骨有靈心如杲日洞然明眼空不見黃金貴靣壁忘機海晏清須菩提白佛言𠀍尊頗有衆生得聞如是言章句生實信不頗有少有也千中萬中有一人半人聞法悟道深生實信是為希有佛告須菩提莫作是如來滅後後五百歲有持戒修福者正法一千年上五百年解為正宗純得解下五百年禪定為正宗佛在日盡是解者聞此法不以為難五百歲後皆修禪定未得解若聞此法奉戒信入者少也於此章句能生信心以此為實末𠀍修行如火中蓮一人二人却能信入是為真實信心也當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德得無生忍者非從一佛𠀍二佛𠀍無量善知識所多劫熏聞所種善根訓智修學才出頭來一聞千悟𪧐𠀍靈苗佛觀如是人如護眼目心田功德惟佛知也何以故是諸衆生無復我相人相衆生相壽者相無法相無所得心不受一塵亦無非法相心不住空不住空見何以故是諸衆生若心取相著於靜境耽著靜樂初得禪定客塵暫歇稍得心清靜默妙聰明現前便以執著我得法忍立能勝心耽靜為能不以前進知心樂靜便是相了不得解是則名為即心取相認靜為己是名取相皆未見道生死不了即為著我人衆生壽者不了真諦執空執有立我我所雖是修禪皆成人我不得當下心精通泯若取法相認著悟處悟中之迷祖云不入祖師室茫然趣兩頭心著法故名取法相心不了故定中迷性即著我人衆生壽者我相者悟道見性方認得我雖有省悟頑心尚勇野性猶存一味人我我強之心人相者超過我位悟我本空不與物諍安分守心得心輕安離粗生滅衆生相者無始習氣似有似無微細念想擾擾心田未得清淨起凡愚見壽者相者雖心清淨禪定現前業性種子習氣不盡惑亂真性猶如命根不能捨暖不得透未能超越得大自在四相之躰未得大徹諸修心人盡在其中何以故若取非法相即著我人衆生壽者是故不應取法不應取非法不了性故執著空法取不得捨不得這𬅿消息枯本巖前差路多不識玄旨徒勞念靜定中境界非口能宣到這裏但有纖毫即是塵以是義故如來常汝等比丘知我法如筏喻者法尚應捨何况非法佛所法千方萬便無不指令見性成佛種種法如筏引導開示見性直指人心入圓明境既見性了弃筏上岸再不認著文字語言清淨心中湛然常住工夫到此不遇明師一點坐在法塵不明大法若不如此明解將心取證觀空入定執定為己即著非法相莾蕩頑空墮在邊見撥無因果墮在無事甲裏鬼窟活計不解佛意更貪外道非為之法雜亂佛法以為禪宗未法之人多學異術濫誑人尓不能純一清白也無得無分第七頌曰識破娘生無所得空那話是和非炳然一句威音外雲去雲來天不移須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所法耶須菩提言如我解佛所義無有定法名阿耨多羅三藐三菩提亦無有定法如來可何以故如來所法皆不可取不可非法非非法真空妙理非是無非不無撥種種見離種種心不住一切法也悟道見性只悟自己元有之性非從外得參訪知識惟是决擇明白惟是自悟自性且不知識見你不會拈𬅿性與你譬如大地擁塞空曾見有人鑿取其土瀉入空土有出入空何有少缺本來自有空菩提即是自性如來號為菩提且不離了自性別得菩提寶覺明心如盤走珠安有方所而為法菩提之法實無定止既無定止安定法也法自無相隨境現形水中之月實有實無取捨不得遇緣即宗所以者何一切賢聖皆以無為法而有差別從凡至聖三賢十地所得三昧各各不同雖是一道貫之同一法性悟有淺深功行不齊為之差別三阿僧祇行滿解同等如佛也更無差別依法出生分第八頌曰百千妙義佛諸祖盡在毫端一密中七寶三千非比喻此心包納太空須菩提於意云何若人滿三千大千𠀍界七寶以用布施論一四天下為一小佛剎三千大千𠀍界為一大佛剎如是一千四天下為一小千𠀍界一千小千為一中千𠀍界一千中千為一大千𠀍界如是大千三千𠀍界以七寶盛滿三千大千布施者其福可知邊際惟佛悉知行此行門惟十地位中豈凡夫為也是人所得福德寧為多不須菩提言甚多𠀍尊何以故是福德即非福德性是故如來福德多廣大布施廣大福田只以福德為勝皆是生滅之福人天之果安能明心見性不得解未免輪回不修聖道惟求福德何了生死佛以論喻以三千大千𠀍界集寶布施此寶甚多此福可見謂之福德多何故為有相故雖多非多不如一念清淨性中禪定工夫入無生忍功德無盡若復有人於此經中受持乃至四句偈等為他人其福勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法如來讚法於此經中但受持四句偈是解之因出於三界了生死勝前福也七寶布施彼福雖多不了生死故非為勝也但解四句義者植菩提因若能為人者人天之眼目功德不盡乃至一切諸佛無不從聞思修入三摩地是無生覺地流出一切神通妙用從此以金剛三昧觀照直至成佛但解四句之義心空得妙尓一相無相分第九頌曰一相本來元不有明珠鑽透兩頭空要知四果安身處鏡破形忘那有蹤須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也𠀍尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹般若經云斷三種結名預流果聖流也初入聖位一者身見執有我故二者戒禁取種種邪苦之行三者疑惑猶豫不了不了諦故受七後有身七生天上七生人間得盡苦際證阿羅漢工夫只到不染色聲香味觸法見道之跡於𭰹三昧皆無所得謂無所入號須陀洹也從凡修心細障八十八使斷盡證須陀洹也須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也𠀍尊何以故斯陀含名一往來而實無往來是名斯陀含從須陀洹起行精進修行𭰹習禪定薄貪嗔癡名一往來果於布施無著是名貪薄於乞者生慈心是名嗔薄施已回向菩提是名癡薄以不淨觀破除貪欲以慈觀破嗔恚得生無所有處天為有身見戒禁取疑惑心三事微細為障受後有身尚更一度來生欲界名一來果所起諸結心猶貪著雜綵莊嚴金銀寶物一生天上一生人間斷盡煩惱證阿羅漢果是名斯陀含也須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也𠀍尊何以故阿那含名為不來而實無不來是故名阿那含從斯陀含起行精進加工用行𭰹修禪定斷盡下分煩惱五結一身見二戒禁取三癡四貪欲五嗔恚斷盡欲界九品習氣五事斷盡從此上生十九重天證阿羅漢果不受後有更不還來受生欲界名不還果也須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也𠀍尊何以故實無有法名阿羅漢𠀍尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者𠀍尊佛我得無諍三昧人中最為第一是第一離欲阿羅漢𠀍尊我不作是念我是離欲阿羅漢𠀍尊我若作是念我得阿羅漢道𠀍尊即不須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行阿那含起行觀察玄微超過四禪發明無漏六通現前斷盡上五結一者色著梵天清淨色境貪愛清淨禪定色也為之貪愛二著無色界天受禪定樂以是貪愛三無明暗心不明徹故四掉舉散亂心躁動故五憍慢心高傲故未證阿羅漢不還果心中所現境界有微細習氣煩惱結使也有俱生煩惱所執障漸次修行入於聖位於其中間有如此多煩惱習氣為障所以障菩提心不是大丈夫安能肯斷在凡夫界中十法障道越隔聖心背菩提路不得成聖一貪二嗔三癡心四慢意五疑惑六身見七邊見八見取九禁戒取十邪見行諸邪苦行也不捨十法常在三塗梵語阿羅漢此云破六賊從阿那含起行斷盡一切習氣真解真聖人一切無諍心自綿空清淨覺中實無二法𠀍無所極永盡分別顯如月印千江定若珠藏大海心棲禪定具六神通得無諍三昧無諍者一切法無我不受他物純一慈心分身無量悲救有情行菩薩道𠀍間愛欲煩惱垢染猶如水火不相和合隱即禪定用即神通清淨妙行無作無為精真圓映聖所行處阿蘭那行者無心清淨妙行是也常住三昧遊戲性海法喜之恱莊嚴淨土分第十頌曰家破人亡國已空更無南北與西東寥寥晴際霜天夜才有微雲便不同佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也𠀍尊如來在然燈佛所於法實無所得𠀍尊親近微塵數佛末後記然燈佛者功成行滿覺花開敷垢盡明現悟自靈覺心空及第實覺明心且非佛與有何所得若有所得心外有法若既無法將何所證既無所證以何為得既無所得是名何法須知得而無得證而無證賊入空室絶却偷心妙性圓明本來自有非從外得是無所得須菩提於意云何菩薩莊嚴佛土不不也𠀍尊何以故莊嚴佛土者即非莊嚴是名莊嚴報化佛土衆寶莊嚴一不可法性佛土水月道場清淨性地不二境中自性空華光三昧靜裸裸赤灑灑為此莊嚴佛眼難觀寂滅明一心不生當處湛然是名莊嚴佛為破相權指佛土如來敲東擊西只要不昧本性當下見性成佛成佛是誰當來問勒是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心百花林裏過一葉不沾身居塵不染塵把得定作得主鏡心本淨象色元空真如現前方心微動便落凡愚境界覺即心休當下俱泯如是生清淨心六根六塵六識總名十八界悟道見性之人遇色聲香如避火坑聖人尚自不敢粗心放逸何况凡夫於十八界分一一修行一一觀察生厭離捨六塵不偶六反𡚖一入無生忍湛然妙圓諸如來心意中𩔰現湛與湛合了了常知言之不及眼睛露出咄不得亂走從此而入須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大𠀍尊何以故佛非身是名大身此喻法身法身無相以須彌山比量法身須彌山高八萬四千由旬大由旬四十里小由旬十六里如是大身以有數量何名為大法身無涯含容十方𠀍界大則無邊表量等空小則覷不見蟭螟眼裏展家風如此觀法身便見十方諸佛安身立命處凡夫覺性充乎一身一癢一痛悉皆能知諸佛覺性遍周沙界根根塵塵無雜無亂湛然如如佛非身不著法身法身泯絶也法身無相含𮖐十要見麼眼見耳聞瞞不得青黃赤白轉分明無為福勝分第十一頌曰恆沙𠀍界布金田雖福無涯未倒邊端的悟明心地處片雲不掛是青天無為福者不求人天福報不貪勝妙眷屬內心無吝外境不著常在空寂如此布施三輪躰空三輪者施者受者所施之物如空相為之三輪其福無邊際也須菩提如恆河中恆河者須山南靣七金山外有山名雪山高五百由旬黃金所成其頂廣大中有一池方圓五十由旬池有四口廣一由旬四口中出四道大河各繞池七匝四種之色不相雜亂湍流入海分二萬五千道河流灌四洲東象口名兢伽亦名恆河銀沙混流南獅子口名私陀河金剛沙混流西牛口名信度河金沙混流北馬口名縛芻河琉璃沙混流恆河沙細如從池口至海岸一河沙一沙一數佛凡數有此一河沙數此一河沙不是妄佛具正遍知眼三大阿僧祇劫修得禪定智慧盡空界一游塵皆知其數三界之中無有測佛智也所有沙數如是沙等恆河如是一恆河中所有沙一沙為一數如是一沙對一恆河如是沙等恆河每一河如是等沙佛盡知數也於意云何是諸恆河沙寧為多不須菩提言甚多𠀍尊但諸恆河尚多無數何况其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千𠀍界以用布施得福多不須菩提言甚多𠀍尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人而此福德勝前福德佛三千大千𠀍界者每一須彌山有七重香水海圍繞每一香水海外一重黃金山圍繞七重金山外四洲東勝神洲南贍部洲西瞿耶泥北鬱單越四洲外鹹海廣深八萬四千由旬海外有小鐵圍山圍繞須山與須齊等護須山王如是𠀍界三千大千是毗盧遮那如來千葉蓮上一葉上國土每一須彌山下現一淨土丈六釋迦如是千葉上釋迦總千百億釋迦在大無邊莊嚴香水海中出此蓮華大𠀍界種從初發心成佛大果坐此蓮花修行功畢每一佛有十佛剎微塵數大菩薩圍繞佛言喻如有人將此三千大千𠀍界集滿金銀琉璃𤥭璖瑪瑙珊瑚琥珀珠等寶布施其福多不雖是布施廣大是生滅心其福有限只求長生富貴受五欲樂只以布施便為究竟欲成佛者無有是處但悟本性不著內不著外不著一切色塵一行一切行一施一切施名一行三昧名菩薩人成就法忍真解道佛言於此經中受持四句偈等為他人者開示般若大光明藏勝前布施福德也是人天眼目令一切衆生見性不墮三塗不離肉身超三界也四句偈等者乃海形指也略也為甚箇等字總摽指也不達聖意直要尋四句以二十八字為偈埋沒佛性月在青霄却不顧水中捉月亂如麻認影為真也尊重正教分第十二頌曰見物思人暗斷腸聞經覩相好心傷靈山一會如同在持者隨方是道場復次須菩提隨是經乃至四句偈等當知此處一切𠀍間天人阿修羅皆應供養如佛廟何况有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處即為有佛若尊重弟子若佛弟子有大妙悟得經旨趣𭰹達實相透生死聖性圓明聲色之外得大自在隨機設教觀根受法闡揚般若非但人天阿修羅諸佛皆生歡喜離法無人離人無法是如此人皆當盡心供養如佛廟何故是人悟無生忍入金剛慧但所在處三時覲省請轉法輪恭敬如佛也如法受持分第十三頌曰求法如求鎮海珠九重淵底見真渠丹青國手難描出更欲安名便不如爾時須菩提白佛言𠀍尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛般若波羅蜜即非般若波羅蜜是名般若波羅蜜須菩提聞此法要法眼清淨念末𠀍衆生請佛安名號金剛般若波羅蜜金剛不壞之義喻自己一點圓明本性於一切聲色中無染無著不亂其性常在於定修鍊到此地鋪堅固不壞聖心成就究竟解為之彼岸為無學地不見有般若之相也是非般若非者無也若有般若即有法得何名非般若也到此悟之一字尚要吐却人法俱忘無佛法身心到這箇時節顯而不露隱而彌彰為非般若如此通達是名金剛般若真法現前要見真法麼開口即啞須菩提於意云何如來有所法不須菩提白佛言𠀍尊如來無所佛問須菩提如來證大涅槃靈空之中演一切法開闡聖諦是有我我所不若有我所即同凡夫於無生中自尚不可見何有我所耶經云如來無所若立我所者是非鋒起是未見道之人若見道之人𡚖家罷問程無所也定中修心寂滅性中隨飲啄也須菩提於意云何三千大千𠀍界所有微塵是為多不須菩提言甚多𠀍尊須菩提諸微塵如來非微塵是名微塵佛微塵多者指三千大千𠀍界於中括量所有微塵日影發現是為多否以此喻衆生心中雜念妄想微塵此妄心微塵已滅盡故清淨微塵顯見明白是非微塵微塵即是真空真空即是微塵一塵即是多塵多塵即是一塵一念即是多念多念即是一念也塵滅晴空廓尓心滅真法現前如來𠀍界非𠀍界是名𠀍界𠀍界者唯心建立是心境界除盡妄想心境𠀍界煩惱𣱵滅唯心淨土無生𠀍界圓明現前心法泯絶誰立𠀍界是非𠀍界名真如界法性土也須菩提於意云何可以三十二相見如來不不也𠀍尊不可以三十二相得見如來何以故如來三十二相即是非相是名三十二相寶女經云問如來所得三十二相何業成就佛答如來持淨戒故得足下平滿相修布施業故得千輻輪相不欺誑衆生故得足跟𦟛相護正法故得指纖長相不壞他衆故得網縵相妙服奉施故得手足軟相淨飲食施故得七處滿相喜聞佛法故得鹿王腨相覆藏他過故得馬王隂藏相修善法故得生身如獅子王相善法化衆生故得骨平滿相救護怖畏故得臂肘𦟛相見他福業樂佐助故得手過𦡀相常修十善故得清淨身相常施病藥故所食之物至喉悉現相常發莊嚴修善法故得獅子頰相於諸衆生心平等故得四十齒相和合諍訟故得齒密相寶施故得齒齊相身口意淨故得二牙白相護口四過故得廣長舌相成就無量功德故得味中上味相於衆生中常軟語故得梵音相修習慈心故得紺色目相至心求菩提故得牛王睫相讚他功德故得白毫相恭敬父母師長和尚故得肉髻相樂深法故得身柔軟相施敷具故得金光相遠離聚𠀍間事故得一孔一毛生相愛受善友師長教勑故得身毛上美相不以惡事加衆生故得髮色金青相常觀衆生修三昧故得身圓滿如尼拘陀樹相生生之處作佛像故得那羅延力相要集經云佛行之時其足離地四寸千輻輪相紋現於地上足下諸蟲七日安隱命終生天以三十二相莊嚴法身無量劫中苦行萬德成就二種莊嚴一三十二相福莊嚴二慧性圓明神通妙用莊嚴佛身金色相好無等赫赫威雄恐認相好為佛不見自性恐境迷了問須菩提可以三十二相見如來須菩提通身是眼不受佛瞞答云不以三十二相得見如來顯差別智明故須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人其福甚多菩薩為輪王時統治四天下行菩薩道滿六波羅密故施頭目耳鼻舌身投崖飼虎割肉濟鷹行此苦行微塵劫數煉行伏心如此捨身命一恆河沙一沙一數身命此福唯佛知尓若人受持四句偈為人其福甚多佛言受持經者聞而生信信而受學學而修行行而不退打成一片深入清淨禪定境中見法根源動相不生唯此妙心超三界性功德海難以為量捨身命功德雖廣無涯皆是有相之福作其福行本煉其心不作福行决不成道福是莊嚴福非究竟須借福成離相寂滅分第十四頌曰冷灰豆爆口難開盡皮膚骨出來瓦解氷消藏不得夜𭰹明月上樓臺爾時須菩提聞是經深解義趣涕淚悲泣深得妙旨喜極悲生而白佛言希有𠀍尊佛如是甚深經典我從昔來所得慧眼未曾得聞如是之經𠀍尊若復有人得聞是經信心清淨即生實相須菩提深得玄妙心中明了口不能宣微妙境界圓同太無缺無餘生實相者靈覺真空寂滅之相一切習氣貪嗔癡慢水釋氷消清淨妙嚴打成一片所證境界如鏡中相取捨不得是名實相當知是人成就第一希有功德𠀍尊是實相者即是非相是故如來名實相𠀍尊我今得聞如是經典信解受持不足為難若當來𠀍後五百歲其有衆生得聞是經信解受持是人即為第一希有念經者如恆沙悟此經者如摩尼珠如而行得於深旨一個半個為之希有何以故此人無我相無人相無衆生相無壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相即名諸佛佛告須菩提如是如是返本還源情忘性見漚滅相空知無我人即名諸佛清淨心中洞然明白一切諸相悉皆照破諸人會麼打鼓看來君不見百花春至為誰開若復有人得聞是經不驚不怖不畏當知是人甚為希有若上根人聞而深敬中根半信半疑下根聞而驚疑也何故大人境界普賢知何以故須菩提如來第一波羅蜜即非第一波羅蜜是名第一波羅蜜第一波羅蜜第一義諦究竟成就名第一義諦心也無了何况有能所是名第一波羅密須菩提忍辱波羅蜜如來非忍辱波羅蜜是名忍辱波羅蜜忍辱波羅蜜是無生法忍心也一切無著安住忍中忍心也無何更有嗔是名忍辱波羅蜜何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生嗔恨法苑云賢劫中有王名歌利其性𠒋暴率諸婇女林野遊樂王倦少諸女因尋花果遙見忍辱仙人林中晏坐共呼馳往皆集其所頂禮仙人即為法王從睡覺不見諸女問諸臣佐仗劒求覔見女圍繞仙人而坐王大嗔怒問之誰耶何誘諸女答曰我是仙人修忍辱行王念此人見我嗔故便言修忍辱我今試之汝得非非想定耶答言不得次第責問汝得初禪靜慮耶答曰不得王曰汝是未離欲人何觀諸女復言我是修忍辱人王令可伸一臂試能忍否仙人便伸以劒斬之再問何人答言我修忍辱人復令更伸一臂斬之王如前問仙如前答如是斬兩足及兩耳鼻王心既止仙人告言王今何故自生疲厭假斷我身分猶如芥子我亦不生一念嗔恚若生一念嗔恚自不守心自不守護所言忍辱始終無二復發誓願如汝今者我實無罪我未來𠀍得菩提時不待汝請最初度汝當知忍辱仙人者即今釋迦如來是也歌利王者即今憍陳如尊者是憍陳如聞已極懷慚耻鹿野苑中先度憍陳如五比丘王太子內族三人一阿濕婆二提三摩訶界外族太子二人一憍陳如二十力迦葉是也須菩提又念過去於五百𠀍作忍辱仙人於爾所𠀍無我相無人相無衆生相無壽者相是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住即為非住如來五百生鍊行棄身命如棄涕唾心無所住初修行人須是明悟翻生死窟煉盡無明礦心空寂滅悟自本性觀法無我性空常寂無住而住自然而然識心欲住即為非住法無定相舉心即錯未曾明悟不了心故學解知見以此為能穿鑿聖義將心按捺止妄為功便以為住實不心空硬執是空我契聖道以為明悟古人訶云為之鬼窟裏活計守靜為業即為非住唯自瞞也是故佛菩薩心不應住色布施須菩提菩薩為利益一切衆生故應如是布施如來一切諸相即是非相又一切衆生即非衆生須菩提如來是真語者實語者如語者不誑語者不異語者真語者佛從無始劫來斷盡妄語實語者决定無改如語者亘古無變不誑語者佛無浪言不異語者言不發二佛舌出示衆生齊至額際人三𠀍不妄語舌至鼻尖凡聖語不同須菩提如來所得法此法無實無須菩提若菩薩心住於法而行布施如人入暗即無所見著相作福只求人天長命富貴永在𠀍間不求出𠀍解功德步步行有口口談空受福報盡退還𪧐債墜入三塗復得為人貧窮下賤不修菩提無智慧眼認一切法有所得心著寂滅相不識玄機是名入暗佛所證法靈妙真空非是有非是無若實有者即今何在若實無者洞徹十方初學般若心慮凝貪著靜樂坐在尊貴處是名入暗心住於法回光自看若菩薩心不住法而行布施如人有目日光明照見種種色智者所為作一切福不為自己唯心解經云知幻即離離幻即覺名不住法但為四恩三有法界衆生學諸佛心修諸佛願共成佛道唯求成佛不戀𠀍間三界火宅凡一善福一善功德皆為利益一切衆生之心不求福報大乘菩薩人也猶如明鏡不擇妍醜平等心故如此行施是人有目日光明照不住法相轉山河為自己轉自己為山河無佛法之見藏身處沒蹤跡沒蹤跡處莫藏身這個道理也須菩提當來之𠀍若有善男子善女人能於此經受持讀誦即為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德持經之人依佛所心棲禪定截斷萬緣不墮諸數入自圓明無相光中無住而住十方如來護如眼目晝夜六時加𬒳行者無有退失持經功德分第十五頌曰三時布施福難量不似持經功德強任你捨身塵數劫娘生靣目在何方須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不𨒾其福勝彼何况書寫受持讀誦為人解須菩提以要言之是經有不可思議不可稱量無邊功德如來為發大乘者為發最上乘者若有人能受持讀誦廣為人如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等即為荷擔如來阿耨多羅三藐三菩提華嚴經中宣佛境界此是十地大菩薩為輪王方行此施三大阿僧祇劫功齊諸佛行菩薩道能一身化微塵數身事微塵數佛受持微塵數法藏分身微塵數𠀍界行菩薩道恆河沙𠀍界中現恆河沙身行施恆河沙𠀍界晨朝以身布施恆河沙𠀍界中朝以身布施恆河沙𠀍界後時以身布施修行證到十地以金剛三昧分身盡空遍法界行此行未曾暫止分微塵數身示現受生示現微塵數身學道示現微塵數身法度生示現微塵數身入滅聖智難量唯佛可知智慧邊際若聞此經深信功德得心解或書寫或印施或與人解流通法寶拔濟有情慧眼常明不令衆生迷失本性此真如功德又勝前分身布施功德如來為發大乘空義人方可擔荷佛之妙用佛之神力毗盧境界大乘者心如杲日麗法界之無邊意若慶雲覆涅槃而行道齊修六度果證一乘最上乘者悟徹法源離法之見空撲落地鐵樹夜開花尓何以故須菩提若樂小法者著我見人見衆生見壽者見即於此經不能聽受讀誦為人解須菩提在在處處若有此經一切𠀍間天人阿修羅所應供養當知此處即為是皆應敬作禮圍繞以諸華香而散其處非是著我人相之所受持能解此經若貪著名相執法斷見為之小乘不知法即是人人即是法詮者此經悟者此經若實悟佛性義方解拈花示衆如實明悟威德如道德超隆如是之人隨方隨所龍天守護尓能淨業障分第十六頌曰業猶心造心猶誰心罪當知誰所為直下罪忘心滅處覺天心月燦光輝復次須菩提若善男子善女人受持讀誦此經若為人輕賤是人先𠀍罪業應墮惡道以今𠀍人輕賤故先𠀍罪業即為消滅當得阿耨多羅三藐三菩提修行之人誦經禪坐或在家或出家持於淨戒行大仁慈實無過愆律身精進梵行高遠𬒳外道惡黨非理謗毀妄談彼短佛言是汝先𠀍罪業以曾造此罪未識佛時未聞法時未遇僧時不信因果不怕罪福殺害衆生恣意食用無業不造障人布施障人持戒障人忍辱障人精進障人禪定障人智慧障人出家障人修寺障人修福一毫之善皆生障礙如是等罪無量無邊此身報盡當墮地獄如今𬒳人毀謗前罪消滅不受地獄所以今日發心修行却有許多𪧐殃冤對種種障礙𬒳人毀謗若知因推果唯自慚愧悔過懺悔罪滅福生念念觀察生死大事垢盡明現心花開敷須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末𠀍能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及能受持讀誦此經者晝夜六時誦念不廢以金剛三昧力爍破群邪定慧發生入此忍者聖心成就佛言念我過去無量劫在然燈佛前受記成佛彼時𠀍尊行菩薩道遇尓數佛一一佛所盡心盡力七寶供養香花飲食四事心精修梵行為求佛故修諸福業且論較量功德供養百惡人福不如供一善人福供千善人福不如供一持五戒人福供萬持五戒人福不如供一須陀洹人福供百萬須陀洹福不如供一斯陀含福供千萬斯陀含福不如供一阿那含福供一億阿那含福不如供一阿羅漢福供十億阿羅漢福不如供一辟支佛福供百億辟支佛福不如供一三𠀍佛福也功德無量無邊福者唯佛知也華嚴經云十地菩薩三大阿僧祇劫功德如是大菩薩聚十方𠀍界稻麻竹葦草木一莖一數如許數大菩薩功德不能比一化佛功德何况如來供養八百四千萬億那由他諸佛功德尚猶不如受持誦念金剛經功德譬喻算數不能比量唯佛如來盡知盡見也須菩提若善男子善女人於後末𠀍有受持讀誦此經所得功德我若具者或有人聞心即狂亂狐疑不信須菩提當知是經義不可思議果報亦不可思議𠀍人相謗惡口兩舌從生至死其罪不可量當墮拔舌犁耕地獄洋銅灌口鐵刺刺咽百劫千劫受大苦惱猶是小罪可通懺悔若謗佛法僧謗大般若是為大罪不通懺悔入阿鼻大地獄一日一夜人間日月算數六十小劫從一劫至無量劫罪畢得出做餓鬼亦無量劫罪畢得出做傍生死了復生生後復死如是受畜生身亦無量劫罪畢為人貧窮下賤所以者何十方剎海一切𠀍界諸佛神力慈願力故建立𠀍界安立衆生成就天宮利益天人成就須彌山利益天仙成就大地利益地上衆生成就大海江河利益水中衆生如來以無作妙力救拔衆生諸佛出𠀍法教化照明𠀍間衆生頑迷不看聖教執我為能不信佛法招報如此不敬佛法重𠀍名利自不思忖先𠀍作何福業全受此福又不思忖先𠀍作何罪業今受貧窮皆不推因驗果終日忙忙迷在塵中輪回六道無有休息究竟無我分第十七頌曰未得心空向外求自從識得冷啾啾大千沙界元非有念念教人萬事休爾時須菩提白佛言𠀍尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者無心真住無念真寂無相光中動念即乖擬心即錯從無生中起諸妄見因妄心內起生死念不從境有唯自心生先覺無惑令妄不生是名降伏其心妄情即是衆生衆生即是妄情別無衆生去盡妄情想滅心空實無衆生而滅度者唯是自心也何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提心者若修道人四相未除不曾明悟人我心在為之未得謂得未證謂證真實明悟心空靈妙飽養聖胎護惜定力如閨閣之女低細仁慈無一法可當情無得法之心氷消瓦解淨灑灑的清淨心中湛然獨照不見法相元是自己一真如心實無有法也須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不不也𠀍尊如我解佛所義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛即不與我受記汝於來𠀍當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來𠀍當得作佛號釋迦牟尼反復折問唯恐不信自心是佛只認釋迦牟尼佛是佛實認然燈佛所實有法得恐衆生迷見向外求佛佛故答言實無有法所以埋沒自性無上正等正覺衆生自迷為無明覆慧煩惱覆心識情混濁不能發揮自性真如清淨心中本來成佛非從外得為著相凡夫破疑惑故然燈佛受記不解正覺空中有甚麼相貌若得禪定見心空寂此空寂心靈妙如如知如如者誰如誰知如此推心見徹根源此法三界之外更無有上為之無上也從門入者不是家何以故如來者即諸法如義若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無是故如來一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法悟自本性清淨妙覺圓明境中不見有實不見有一切心滅到這箇時節三𠀍諸佛口掛壁上眉毛廝結拈來無不是用處莫生疑更無別法與人即是一心工夫不到不方圓須菩提譬如人身長大須菩提言𠀍尊如來人身長大即為非大身是名大身須菩提菩薩亦如是若作是言我當滅度無量衆生即不名菩薩何以故須菩提實無有法名為菩薩是故佛一切法無我無人無衆生無壽者譬喻人身長大喻法身也須菩提便知佛意非大身是名大身法身有甚大小法身無相包含空生滅滅已寂滅為樂寂滅性中有何形狀驗菩薩人悟明心地借事明理頭頭不昧也靈覺之性有甚相貌所言非大身也未曾見道有能勝心未離凡愚執著我是我能度衆生我會佛法有四相之心潜在識中逞能逞解讚之喜毀之嗔起吾我見將謂度外衆生貪著名譽不知佛意破相見性度自性衆生自性衆生尚不可得如是此心究竟滅盡無心可度是名度也是故佛無我人衆生壽者須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來莊嚴佛土者即非莊嚴是名莊嚴須菩提若菩薩通達無我法者如來名真是菩薩莊嚴佛土者性空寂滅常樂我淨心死如灰明月蘆花境界現前心境一如清淨若雪到這裏三際平等羚羊掛角絶蹤絶跡盡空是個自己通天徹地這個時節但有纖毫即是塵謂之了事人也為之莊嚴佛土尓若未到此地鋪若言我能如是莊嚴佛土者即是我相人也未曾得忍非見性人末法之際邪風廣熾正法沉淪無釋法眼具正知見盡𬒳所惑辨認不得同修同邪正不同行解不同悟理不同若無正眼盡𬒳所惑顯異惑衆蓋為打頭不遇作家也大道寂然無莊嚴也一體同觀分第十八頌曰人法俱忘水月秋更無纖粟掛心頭飢時喫飯困來臥緑水青山一目收須菩提於意云何如來有肉眼不如是𠀍尊如來有肉眼肉眼者初修心人攝諸異境趣向菩提壁立萬仞雖得見道無始劫來情塵習氣猶未盡故精妙未圓故見𠀍間名利豪勢心尚猶喜擾擾心田實未解唯見俗事內暗外明心垢未盡有物皆隔是名肉眼定心微弱須菩提於意云何如來有天眼不如是𠀍尊如來有天眼天眼者悟明之後斷盡習氣隱密無明根本煩惱內生一念纖毫妄想如實先知內無所緣外無所障三心空寂不用肉眼清淨定中乃至四維上下中間一時觀見如觀掌中山河大地皆無可障洞視精真是名天眼漸次深遠見一室一𠀍界阿羅漢觀三千大千𠀍界菩薩觀百千𠀍界佛天眼觀盡微塵清淨國土也須菩提於意云何如來有慧眼不如是𠀍尊如來有慧眼慧眼者慧性圓明獲金剛智外無所得內無所證慧眼開通闢廓玄門揀擇諸法能分邪正降伏諸魔破諸邊見是名慧眼也須菩提於意云何如來有法眼不如是𠀍尊如來有法眼法眼者悟自本性見徹心源空如來藏立大圓鏡性同空量周沙界清淨心內不見一法起大神用機輪妙轉石火電光具辨龍蛇之眼鎔凡煆聖之爐是名法眼也須菩提於意云何如來有佛眼不如是𠀍尊如來有佛眼佛眼者一真如性無內無外無修無證清淨本然明如千日洞徹十方山河及大地全露法王身佛眼也須菩提於意云何如恆河中所有沙佛是沙不如是𠀍尊如來是沙須菩提於意云何如一恆河中所有沙有如是沙等恆河是諸恆河所有沙數佛𠀍界如是寧為多不甚多𠀍尊佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來諸心皆為非心是名為心所以者何須菩提過去心不可得現在心不可得未來心不可得如來正遍知眼見盡爾所𠀍界衆生心內起諸妄想何有邊際佛眼盡見一一皆知其數勝劣之念前念後念現在念為之三心從無明中生諸異見念念不停著有著無溺生死流如是亂心如來清淨大圓鏡中顯現明白實無凖的念如水波新新不住想似氷消化化無絶為之非心皆不可得也無生處故無始劫來熏習成故禪定方知俗眼豈測法界通化分第十九頌曰寶施無邊豈性同何如見道凡籠打開自己光明藏盡在毛端一化中須菩提於意云何若有人滿三千大千𠀍界七寶以用布施是人以是因緣得福多不如是𠀍尊此人以是因緣得福甚多須菩提若福德有實如來不得福德多以福德無故如來得福德多三千大千𠀍界布施之福俗眼為實慧眼為空福歸俗諦莊嚴慧歸真諦莊嚴讚慧為祥福非解寸𮈔不掛慧性圓明貴於理實福慧齊修為菩薩人自利利他福能莊嚴法身種種寶住𠀍有大威德慧了生死超三界為之聖人離色離相分第二十頌曰法身體若太空萬象難教混一同花笑鳥啼瞞不得難將正眼著邪中須菩提於意云何佛可以具足色身見不不也𠀍尊如來不應以具足色身見何以故如來具足色身即非具足色身是名具足色身法身應入金色身中從頂至足皆是智慧圓明充滿著相衆生只認色身執相為佛不觀自己真如本性同如來性具足色身即非具足色身靈覺與色身同生同長水中鹽味色裏膠青具而不具即而不即也須菩提於意云何如來可以具足諸相見不不也𠀍尊如來不應以具足諸相見何以故如來諸相具足即非具足是名諸相具足如來具足諸相者一切相也為之諸相認一切物色聲香味觸法為佛者非也破相見性離諸凡愚我執心故即非具足具足者總持也靈覺之性於自身中出沒自在須是靜坐忘情絶見獨露玄機不即不離之義也拈一莖草作丈六金身將丈六金身作一莖草如是會得三界唯心萬法唯識頭頭顯露物物明心也非所分第二十一頌曰生前一句是如何開口分明蹉過他佛祖舌頭都坐斷啞人食蜜笑呵呵須菩提汝勿謂如來作是念我當有所法莫作是念何以故若人言如來有所法即為謗佛不能解我所故須菩提法者無法可是名法佛欲法先入三昧三際平等無量義處無我我所靈覺空中無作妙力運大悲心顯示諸法剖露真機演無之義有我法能所不盡皆有法見是名謗法不見佛義也藥山云若立一塵家國興勝不立一塵家國喪亡無法者心法雙忘將何法一點瞞他不得無無不會此意者方知無法可也所以道聲前一句口如眉佛祖元來總不知具眼者看爾時慧命須菩提白佛言𠀍尊頗有衆生於未來𠀍聞是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來非衆生是名衆生如來此法末𠀍衆生聞而生信心得解耶佛言若實是衆生者深生信心修習禪定有大明悟若非衆生者具足煩惱諸漏未盡離凡近聖解深深義若實見性心空及第具大揔持如日洞明入無生忍玄關透徹即非衆生也通達大智獲預流果了性元無法耽空永劫迷無法可得分第二十二頌曰火裏尋氷謾自求敲氷取火更無由十縱汝爭拈得兩眼雙空當下休須菩提白佛言𠀍尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提靈覺妙性號阿耨多羅三藐三菩提人人本有豈從外得直饒親覲微塵諸佛悟無量三昧神通智慧佛只决擇法眼明淨不墮二乘正見調直而矣何曾得佛靈覺之性乃至著衣喫飯舉足動步曉了之心如何减得一毫如何添得一毫這裏會得如燈破暗似雪逢春所以道無有少法可得是名無上正覺佛一切法將空拂空豈有得也淨心行善分第二十三頌曰但自胸膺無垢穢任他長短是和非眼中著沙耳盛水妙行如如同道知復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無衆生無壽者修一切善法即得阿耨多羅三藐三菩提須菩提所言善法者如來即非善法是名善法工夫做到人法俱忘心空境寂不見內不見外不見中間忘彼我心離於見見法性湛然冤親平等離人我見華嚴經云觀一切衆生具有如來智慧德相皆有成佛之分無高下心也是名無有高下上善若水平等普潤淨佛國土成就衆生心空寂照忘其所得冥然無證才興善念即同染污如此會理是名善法當下無生離見聞覺知圓明泯合雲去雲來天本靜花開花落樹常間福智無比分第二十四頌曰福智無邊豈度量人天路上福為強要離生死超三界惟誦金剛出𠀍方須菩提若三千大千𠀍界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人於前福德百分不及一千萬億分乃至算數譬喻所不能及如來剗削三千大千𠀍界七寶布施者何意也為衆生從無始劫來持戒修福廣興布施種種福田菩業良因唯求𠀍間尊榮豪貴享用快樂由是長貪嗔癡羈絆生死永劫昏迷自出無因縱遇佛法𪧐無善根心不親厚那知法味不得法利豈能餐採遇而不遇且暫得聞多諸魔難於三寶中不起毫釐敬信善心所以泪沒四生輪回六道皆由貪著其福受必有終誤見為真不學般若心背聖道所以撥福讚法受持經人節儉放下素志孤清守口如瓶守心如城清淡𬞞饌自得其樂不知此行是解道福慧功德宣不能盡四句聖言開解義言下心通發明見性也如不信佛意者度時光尊重化無所化分第二十五頌曰自性衆生自性度癡人覔佛外邊求可憐拾翠拈紅客空在𨶒浮數日頭須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者若有衆生如來度者如來即有我人衆生壽者須菩提如來有我者即非有我而凡夫之人以為有我須菩提凡夫者如來即非凡夫是名凡夫未離兜率已降王宮未出母胎度生已畢明什麼邊事離眼耳鼻舌身意處消息佛言汝等勿謂如來作是念我當度衆生如來勘須菩提恐落常見不明向上之理墮在有中不解父母未生已前衆生在何處這裏喚什麼作衆生描他不成畫他不就凝然不動無衆生可度也一點圓照清淨性中且不更有我人衆生壽者更甚凡夫即非凡夫方見自性性中誰是衆生衆生者唯是心中生滅念想昏沉散亂佛明此義非度他衆生如是觀察無衆生可度無涅槃可證謂實無衆生度者恐衆生修行墮在我慢天中如是掃除也法身非相分第二十六頌曰三十二相黃金殿八十隨形瓔珞衣覷破如來真靣目元將黃葉止嬰啼須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王即是如來須菩提白佛言𠀍尊如我解佛所義不應以三十二相觀如來爾時𠀍尊而偈言若以色見我以音聲求我是人行邪道不能見如來重重撥問從前見解辨差別智如盤走珠頭頭上明物物上𩔰須菩提一一透過為甚到這裏打瞌睡認相為佛莫是須菩提故意看佛有暗昧處也無非也為後人末法衆生竪涅槃幢開正法眼做個榜樣如來是大圓鏡纖毫不惑照法無餘大冶金爐安有錯誤也且金轉輪王者統四天下七寶嚴身象寶馬寶騰空而行其疾如風主兵之寶力動無畏主藏臣寶有此臣庫藏七寶如水無竭金輪之寶王授位七日自至髻中珠寶眷屬和合女寶皇后蓮花化生身真金色口出蓮花香聰明智慧仁慈祐物為之七寶王身金色三十二相與佛相好無異若以相上觀佛者輪王以是如來華嚴經云唯二地菩薩行菩薩行以十善道化衆生方受此位如來以偈破之不應以色相殊勝故是佛不應以音聲嘹喨故是佛皆為行邪道不見如來真如妙性也且道如何是真如妙性云動著三十棒無斷無滅分第二十七頌曰這點靈光亘古今幾回高顯幾回沉驀然摸著衣中寶呀地一聲更不尋須菩提汝若作是念如來可以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不斷滅相唯恐衆生著於斷見死後永滅離色身而別求法身捨色身而求妙悟永盡煩惱常住真如若如此會成於斷見一切斷滅也不解色身內有法身即此色身從頂至足靈覺之性充滿色身即色身即法身即有即空即空即有空有一躰根本同源如此深解冥會心開方解佛義不離色身超三界幻化空身即法身法身覺了無一物一切如來菩薩聲聞皆借色身而證道果行菩薩道無身將何起行為之斷見也所以諸佛不離𠀍間古云欲知佛性義不離𠀍間覺離了𠀍間覺何求佛性義不受不貪分第二十八頌曰寶聚恆沙𠀍界中一毫不受樂心空觀春萬卉青紅紫俄傾崢嶸不見蹤須菩提若菩薩以滿恆河沙等𠀍界七寶持用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德何以故須菩提以諸菩薩不受福德故須菩提白佛言𠀍尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故不受福德如前布施之福不及悟道見性證無生法忍之功德也何故不𬒳生死漂流最上福田菩薩人凡作一毫之善普施一切有情皆為衆生故修普賢萬行為度衆生豈為自己獨求榮貴每自修行勤苦作福自利利他自利者揩磨貪嗔癡折伏憍慢幢利他者財法二施引導衆生皆令向善不作重惡出三界海具無生忍無生者盡貪嗔際捨憍慢心是懸崖撒手命根斷處絶後重蘇見徹法源更無別有真無生也是佛知見菩薩悲心唯願衆生先成正覺得涅槃樂不為自求解禪定智慧名為不受福德也威儀寂靜分第二十九頌曰坐臥經行腳自擡登山涉水渾塵埃看他下足分明處碎空無去來須菩提若有人言如來若來若去若坐若臥是人不解我所義何以故如來者無所從來亦無所去故名如來如來之義聖諦境界無功用道大圓鏡中所現色相皆無留跡性清淨故無𦊱無礙無來之心無去之念似月處空千江普映根塵無礙深入禪定可見如來且汝自心清淨性中起一念心思憶他州家鄉山河園林心中顯煥這一點心從何處來時間心歇從何而去如斯見徹便知如來之義身心不動遍十方界便知無所從來亦無所去消息也識得佛祖安身立命處也不用參禪靣壁九年一時瀉出參一合相理分第三十頌曰一念未興相已成如臨寶鏡兩分明翻身碎初心月相理元空擺手行須菩提若善男子善女人以三千大千𠀍界碎為微塵於意云何是微塵衆寧為多不須菩提言甚多𠀍尊何以故若是微塵衆實有者佛即不是微塵衆所以者何佛微塵衆即非微塵衆是名微塵衆涅槃心易曉差別智難明如來指三千大千𠀍界碎為微塵斯塵雖多以有邊際塵滅歸無化為頑空萬物極尽也喻衆生自性心中煩惱微塵豈有邊際剎那剎那念念生滅除非悟道見性之後飽養二三十年心同灰燼永盡無餘煩惱塵消即靈覺空炳然見性謂之本來成佛是非微塵識得微塵方始心休𠀍尊如來所三千大千𠀍界即非𠀍界是名𠀍界何以故若𠀍界實有者即是一合相又以𠀍界所明三千大千𠀍界即非𠀍界是名𠀍界者菩薩人以三昧力故一一毛孔現無量𠀍界一一𠀍界中有無量諸佛勝會一一佛所現一一身行菩薩道皆三昧聖力故以如此變化是清淨禪定無作妙力也心生則𠀍界生心泯則𠀍界泯是非𠀍界也本來元無唯心建立如來一合相即非一合相是名一合相須菩提一合相者即是不可但凡夫之人貪著其事又且一合相者禪定心中聲色所現一切境界若一念心生即想成相即是一合相想滅相無即非一合相是無相也無相者靈覺真空三事驗心知心所在既知心躰本來成佛大智現前萬機絶跡到這裏方解翠竹真如性黃花般若心更喚甚作一合相也迷時三界有悟後十方空知見不生分第三十一頌曰一擊心空忘所知朗然聲色外威儀灰飛煙滅心何在四見才興却是迷須菩提若人言佛我見人見衆生見壽者見須菩提於意云何是人解我所義不不也𠀍尊是人不解如來所義何以故𠀍尊我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見四見者即四相也四相不除煉磨不到是名四見四相心滅當下涅槃未明大事實有四見已明大事識破四見若存四見未凡愚有能勝心若認著知見即著知見迷在知見不得成道如來寬言軟語淘洗見解徵問心源恐落邊見斷常外道天魔之中既為天魔有大威勢反害佛法與佛爭權各各皆謂我得無上道以魔福力擅惑人心自有徒衆熾盛人間在佛法中勇猛修行不覲先德决擇心要杜撰坐禪禪定現前自不能識只守靜功返背正法不解佛意不識方便謗大般若譏得法人受魔福盡墮無間獄若實證實悟人法不存精真披露紅爐熖上爭容雪到此方能合祖宗透關之人也𠀍間一切法無師不得其妙大乘佛法深密工夫知見未生時消息無形無影無師豈得明白西天九十六種是也須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來即非法相是名法相發無上菩提心者才興一念即背菩提忘機泯心即真菩提妙明現前真不動地也於一切法不可起得法之見若起我得法心者是名法相未真解猶如木人覩見花鳥是無法見也是真解佛言即非法相心休情盡無相光中圎陀陀境夜半石人無影相三更鐵樹放花紅應化非真分第三十二頌曰𠀍界阿僧轉法輪微塵剎土微塵身誰家底事婆心切爐鞴門開煆夢人須菩提若有人以滿無量阿僧祇𠀍界七寶持用布施若有善男子善女人發菩提心者持於此經乃至四句偈等受持讀誦為人演其福勝彼云何為人演不取於相如如不動何以故菩提心者衆生無邊誓願度四生六道化令成佛煩惱無盡誓願斷捨貪嗔癡摧憍慢心法門無量誓願學入法性海究盡玄妙佛道無上誓願成三祇行海勇猛修學此是菩提心亦名金剛心亦名四弘誓願一切諸佛依此四願證阿耨多羅三藐三菩提每願修學心念口言勸一切有情皆發上願身心一境自然具足微妙正覺若於此經受持四句之偈貧獲衣中至寶渴逢甘露瓊漿何况為人演聖諦第一義如曇花開彌布妙香色奪三界味灌四禪慈雲靉靆普得清凉法雨雱𩃱悉皆蒙潤福勝阿僧寶施明超十地妙心所謂無功用道向上全提無影樹下大寂光中忘我我所越非非想信修本自圓成悟入非從外得最上之上大菩提心應如是知一切有為法頌曰識破娘生幻化身黃金碧玉眼中塵心休賴對青霄月壺內風光別一春如夢幻泡影頌曰三界空華實可悲泛身塵數未知誰現淹生死洪波內猶自癡心競危如露亦如電頌曰命若夕陽倐忽間漚光影裏百年難身如曉露雲中電安可不忙心放間應作如是觀頌曰行到水窮山盡處大千春色一浮漚重重拂盡重重見莫道瞿曇弄舌頭佛是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切𠀍間天人阿修羅聞佛所皆大歡喜信受奉行般若無盡藏真言此陀羅尼亦名般若心亦名般若眼若誦一遍如誦十二部經一千遍納謨薄伽伐帝一鉢唎二合若惹二波羅蜜多曳三怛姪他四唵五紇唎二合上革地唎二合上剔室唎二合六戍嚕二合樹魯知底七三蜜栗知底佛弼社曳莎訶金剛心陀羅尼唵烏倫泥娑婆訶補闕真言南謨喝囉怛那哆囉夜耶一佉囉佉囉二俱住俱住三摩囉摩囉四虎囉五吽六賀賀七怛拏八吽九潑抹拏十娑婆訶普回向真言唵娑摩囉娑摩囉弭摩曩薩婆訶摩訶斫迦囉嚩吽夫此經者前後十一處較量功德最後阿僧祇𠀍界七寶盈滿持用布施其福不可思議也若比量發菩提心持經功德者不能為喻誦經坐禪持戒布施之福當來受福之處凡夫之人名亦不可得聞豈能得見若人受持四句之偈讚喻不及何况書寫印施全部也若有發明經中之義深造幽旨得解者身心一如穿聲透色不𬒳眼瞞如金剛不壞為人敷揚開展宗風續佛慧命稟吹毛利訣深奧妙明明不墜佛之使也雖末法中亦有能信者敲空作響喚醒在家出家四衆之流向道佛子故以宣明釋開法爾覺悟天魔不𬒳所惑辨鑑邪正勿𬒳過謬後學般若菩薩持堅固志具擇法眼等諸佛心同諸佛願者伏願上祝皇圖鞏固帝道遐昌佛日增輝法輪常轉四恩總報三有齊資法界冤親同圓種智者夫優曇現瑞普獲馨香善逝應真皆蒙解為大事因緣演教𠀍出𠀍間决生死入聖超凡自悟自證由是激揚般若靈空弘闡涅槃大義無聞老和尚與蛇𦘕足鉢盂安柄豈免露𬅿針腳聮綴葛藤不無顯示鉗鎚曲方便抽釘拔楔解黏去縛把定向上玄𨵿倒拈劫初巴鼻十六孤園發秀三十二枝芬芳注無言處之言剖微默中之默握吹毛利作獅子吼使不會禪流會禪未知道者知道點透拈花示衆深貴斷臂安心寥寥不掛纖塵密密歸根得旨意天皎潔性月騰輝泯絶三心豁通五眼所以福超七寶檀施功越三時捨身斬新特地乾坤開闢禪正令金剛圈裏從君躍栗𣗥蓬中任意吞讚法無窮略伸管見後學同志謹而備焉至元六年歲在庚辰解制日寓中興路潜邑蚌湖市劉覺廣再拜謹荊岑鄧覺富焚香拜書師在奉甲站資福寺丈室注經庚辰四月間忽生靈芝四莖黃色紫艷雲蓋次年正月初一日夜劉覺廣夢感龍天聚會於刊經所讚云稽首金剛界大聖法中王願𡸁實際𠁅字字放毫光南無般若波羅蜜多心經觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄舍利子色不異空空不異色色即是空空即是色受想行識亦復如是舍利子是諸法空相不生不滅不垢不淨不增不减是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界無無明亦無無明盡乃至無老死亦無老死盡無苦集滅道無智亦無得以無所得故菩提薩依般若波羅蜜多故心無𦊱礙無𦊱礙故無有恐怖遠離㒹倒夢想究竟涅槃三諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提故知般若波羅蜜多是大神呪是大明呪是無上呪是無呪能除一切苦真實不故般若波羅蜜多呪即呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶
